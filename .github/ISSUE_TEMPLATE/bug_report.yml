name: Bug report
description: Report a bug, regression, or parsing failure
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please avoid posting live credentials, cookies, or sensitive captures.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug or regression clearly.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Include commands, URLs, or parser context as safely as possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Python backend
        - Go CLI
        - Next.js app
        - ChatGPT app
        - CI or packaging
        - Docs
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Extra context
      description: Logs, fixture notes, screenshots, or environment details.
