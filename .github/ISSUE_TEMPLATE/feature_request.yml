name: Feature request
description: Suggest a new endpoint, workflow, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface is this for?
      options:
        - Python backend
        - Go CLI
        - Next.js app
        - ChatGPT app
        - Cross-cutting
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Relevant endpoint or workflow
      description: Mention the Alma or ILIAS flow if you know it.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Why this matters, alternatives considered, or rough implementation ideas.
