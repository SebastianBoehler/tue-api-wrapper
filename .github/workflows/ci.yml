name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python-package:
    name: Python package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Compile sources
        run: python -m compileall src

      - name: Run tests
        run: python -m unittest discover -s tests -v

  nextjs:
    name: Next.js app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Type check
        run: npm run check

      - name: Production build
        run: npm run build

  chatgpt:
    name: ChatGPT app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatgpt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chatgpt/package-lock.json

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Type check
        run: npm run check

      - name: Production build
        run: npm run build
