apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: tue-study-hub-chatgpt
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 40
      timeoutSeconds: 120
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: PORTAL_API_BASE_URL
              value: BACKEND_URL_PLACEHOLDER
            - name: APP_BASE_URL
              value: APP_BASE_URL_PLACEHOLDER
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 12
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 2
