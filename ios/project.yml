name: TueAPI
options:
  bundleIdPrefix: dev.sebastianboehler
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    from: 3.31.3
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
targets:
  TueAPI:
    type: application
    platform: iOS
    sources:
      - path: TueAPI
      - path: Shared
    dependencies:
      - target: TueAPIWidgetExtension
        embed: true
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sebastianboehler.tueapi
        PRODUCT_NAME: TueAPI
        CODE_SIGN_ENTITLEMENTS: TueAPI/TueAPI.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: TueAPI/Info.plist
      properties:
        CFBundleDisplayName: TUE API
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSLocationWhenInUseUsageDescription: "Your location is used to show your position on the campus map and help you navigate around Tübingen."
        NSSupportsLiveActivities: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
  TueAPIWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sebastianboehler.tueapi.widget
        PRODUCT_NAME: TueAPIWidgetExtension
        CODE_SIGN_ENTITLEMENTS: Widgets/TueAPIWidgetExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: true
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: TUE API Widgets
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  TueAPITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TueAPITests
    dependencies:
      - target: TueAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sebastianboehler.tueapi.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  TueAPI:
    build:
      targets:
        TueAPI: all
        TueAPIWidgetExtension: all
    test:
      targets:
        - TueAPITests
